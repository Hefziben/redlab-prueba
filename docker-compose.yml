
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: redlab-sql-server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SqlStrongPwd2026!
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
    driver: local